name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: bash build.sh

      - name: Create zip
        run: |
          cd .build/release
          zip -r ccpaste.app.zip ccpaste.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/ccpaste.app.zip
          generate_release_notes: true
